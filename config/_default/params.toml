mainSections   = ["post"]
rssFullContent = true

[sidebar]
    subtitle = "Overcoming political polarization with philosophy"
    avatar   = "img/avatar.jpg"

[article]
    [article.license]
        enabled = false

[widgets]
    homepage = [
        { type = "search" },
        { type = "archives", params = { limit = 5 } },
        { type = "categories", params = { limit = 10 } },
        { type = "tag-cloud", params = { limit = 10 } },
    ]
    page = [{ type = "toc" }]

[comments]
    enabled  = true
    provider = "disqus"
